<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        #container {
            display: grid;
        
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
      
            grid-template-areas: 
                "uno dos dos tres"
                "uno cinco siete cuatro"
                "uno ocho seis cuatro";
            border: 2px solid black;
            padding: 10px;
        }

        .caja {
            width: 100%;
            height: 100%;
            border: 1px solid black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }


        .uno { grid-area: uno; background-color: green; }
        .dos { grid-area: dos; background-color: green; }
        .tres { grid-area: tres; background-color: red; }
        .cuatro { grid-area: cuatro; background-color: green; }
        .cinco { grid-area: cinco; background-color: orange; }
        .seis { grid-area: seis; background-color: orange; }
        .siete { grid-area: siete; background-color: red; }
        .ocho { grid-area: ocho; background-color: red; }
    </style>
</head>
<body>

    <h1>Grid 1</h1>
    
    <div id="container">
        <div class="caja uno">UNO</div>
        <div class="caja dos">DOS</div>
        <div class="caja tres">TRES</div>
        <div class="caja cuatro">CUATRO</div>
        <div class="caja cinco">CINCO</div>
        <div class="caja seis">SEIS</div>
        <div class="caja siete">SIETE</div>
        <div class="caja ocho">OCHO</div>
    </div>

</body>
</html>
